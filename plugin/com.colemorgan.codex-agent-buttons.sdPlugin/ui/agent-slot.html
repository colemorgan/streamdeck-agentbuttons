<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>Agent Slot</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px;
        color: #e8e8e8;
        margin: 12px;
        background: transparent;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }
      select,
      button {
        width: 100%;
        box-sizing: border-box;
        margin-top: 4px;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #555;
        background: #2a2a2a;
        color: #eee;
      }
      button {
        margin-top: 10px;
        cursor: pointer;
        font-weight: 600;
      }
      button:hover {
        background: #3a3a3a;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
        opacity: 0.9;
        min-height: 1.2em;
      }
      p.help {
        margin-top: 12px;
        opacity: 0.7;
        line-height: 1.4;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <label for="slot">Agent slot</label>
    <select id="slot">
      <option value="0">Slot 1 (AG00)</option>
      <option value="1">Slot 2 (AG01)</option>
      <option value="2">Slot 3 (AG02)</option>
      <option value="3">Slot 4 (AG03)</option>
      <option value="4">Slot 5 (AG04)</option>
      <option value="5">Slot 6 (AG05)</option>
    </select>
    <button type="button" id="apply">Apply slot</button>
    <div id="status">Waiting for Stream Deck…</div>
    <p class="help">
      Slot 1–6 = Codex Micro agent keys. After Apply, the key face should
      show A1–A6. Companion must be running for live colors.
    </p>
    <script>
      /**
       * Stream Deck PI: setSettings/getSettings/sendToPlugin must use the
       * Property Inspector UUID (2nd arg to connectElgatoStreamDeckSocket)
       * as `context` — NOT actionInfo.context. Using the action context
       * yields: "setSettings from the wrong context".
       */
      (function () {
        var websocket = null;
        // PI registration UUID (INCONTEXT) — required for setSettings
        var piUUID = "";
        var actionUUID = "";
        var actionContext = "";
        var select = document.getElementById("slot");
        var statusEl = document.getElementById("status");
        var applyBtn = document.getElementById("apply");

        function setStatus(msg) {
          statusEl.textContent = msg;
        }

        function coerceSlot(raw) {
          var n = typeof raw === "string" ? parseInt(raw, 10) : raw;
          if (
            typeof n === "number" &&
            isFinite(n) &&
            n >= 0 &&
            n <= 5 &&
            n === (n | 0)
          )
            return n;
          return 0;
        }

        function applySettings(settings) {
          var slot = coerceSlot(settings && settings.slot);
          select.value = String(slot);
          setStatus("Current: Slot " + (slot + 1) + " (A" + (slot + 1) + ")");
        }

        function send(obj) {
          if (!websocket || websocket.readyState !== WebSocket.OPEN) {
            setStatus("Not connected — reopen this key");
            return false;
          }
          websocket.send(JSON.stringify(obj));
          return true;
        }

        function saveSlot() {
          var slot = coerceSlot(select.value);
          if (!piUUID) {
            setStatus("Missing PI UUID — reopen property inspector");
            return;
          }

          // Context MUST be the Property Inspector UUID (piUUID), not actionContext
          var ok1 = send({
            event: "setSettings",
            context: piUUID,
            payload: { slot: slot },
          });

          // Optional: also notify plugin directly (context = action instance)
          if (actionUUID && actionContext) {
            send({
              event: "sendToPlugin",
              action: actionUUID,
              context: actionContext,
              payload: { event: "setSlot", slot: slot },
            });
          }

          if (ok1) {
            setStatus(
              "Saved Slot " +
                (slot + 1) +
                " — key should show A" +
                (slot + 1),
            );
          }
        }

        window.connectElgatoStreamDeckSocket = function (
          inPort,
          inPropertyInspectorUUID,
          inRegisterEvent,
          inInfo,
          inActionInfo,
        ) {
          // THIS is the context Stream Deck accepts for setSettings from the PI
          piUUID = inPropertyInspectorUUID;

          var actionInfo = {};
          try {
            actionInfo = JSON.parse(inActionInfo);
          } catch (e) {
            setStatus("Failed to parse actionInfo");
            return;
          }

          actionUUID = actionInfo.action || "";
          actionContext = actionInfo.context || "";
          applySettings(
            (actionInfo.payload && actionInfo.payload.settings) || {},
          );

          websocket = new WebSocket("ws://127.0.0.1:" + inPort);

          websocket.onopen = function () {
            // Register PI session with PI UUID
            send({ event: inRegisterEvent, uuid: piUUID });
            // getSettings also uses PI UUID as context
            send({
              event: "getSettings",
              context: piUUID,
            });
            setStatus("Connected. Pick a slot, then Apply.");
          };

          websocket.onmessage = function (evt) {
            var data;
            try {
              data = JSON.parse(evt.data);
            } catch (e) {
              return;
            }
            if (
              data.event === "didReceiveSettings" &&
              data.payload &&
              data.payload.settings
            ) {
              applySettings(data.payload.settings);
            }
            if (data.event === "sendToPropertyInspector" && data.payload) {
              if (data.payload.settings) applySettings(data.payload.settings);
              if (data.payload.message) setStatus(String(data.payload.message));
            }
          };

          websocket.onerror = function () {
            setStatus("WebSocket error");
          };

          select.addEventListener("change", saveSlot);
          applyBtn.addEventListener("click", saveSlot);
        };
      })();
    </script>
  </body>
</html>
