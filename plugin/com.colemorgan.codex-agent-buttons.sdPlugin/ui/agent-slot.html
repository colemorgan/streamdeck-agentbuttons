<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Agent Slot</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        font-size: 12px;
        color: #ddd;
        margin: 12px;
      }
      label {
        display: block;
        margin-bottom: 8px;
      }
      select {
        width: 100%;
        margin-top: 4px;
      }
      p.help {
        opacity: 0.75;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <label>
      Agent slot
      <select id="slot" class="sdpi-item-value">
        <option value="0">Slot 1 (AG00)</option>
        <option value="1">Slot 2 (AG01)</option>
        <option value="2">Slot 3 (AG02)</option>
        <option value="3">Slot 4 (AG03)</option>
        <option value="4">Slot 5 (AG04)</option>
        <option value="5">Slot 6 (AG05)</option>
      </select>
    </label>
    <p class="help">
      Live status requires the macOS companion (GitHub release) so ChatGPT
      detects a virtual Codex Micro. Assign tasks to agent keys in ChatGPT’s
      Codex Micro settings.
    </p>
    <script>
      // Minimal settings bridge — refined in U4 with sdpi-components if desired.
      let uuid = "",
        actionInfo = {};
      window.connectElgatoStreamDeckSocket = (
        port,
        pluginUUID,
        registerEvent,
        info,
        action,
      ) => {
        uuid = pluginUUID;
        actionInfo = JSON.parse(action);
        const ws = new WebSocket("ws://127.0.0.1:" + port);
        ws.onopen = () => {
          ws.send(
            JSON.stringify({ event: registerEvent, uuid: pluginUUID }),
          );
        };
        const select = document.getElementById("slot");
        const settings = actionInfo.payload?.settings || {};
        if (settings.slot != null) select.value = String(settings.slot);
        select.addEventListener("change", () => {
          const slot = Number(select.value);
          ws.send(
            JSON.stringify({
              event: "setSettings",
              context: actionInfo.context,
              payload: { slot },
            }),
          );
        });
      };
    </script>
  </body>
</html>
