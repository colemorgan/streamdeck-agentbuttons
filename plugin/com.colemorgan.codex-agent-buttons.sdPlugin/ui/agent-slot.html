<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Agent Slot</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px;
        color: #e8e8e8;
        margin: 12px;
        background: transparent;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }
      select {
        width: 100%;
        margin-top: 4px;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid #555;
        background: #2a2a2a;
        color: #eee;
      }
      p.help {
        margin-top: 12px;
        opacity: 0.75;
        line-height: 1.4;
        font-size: 12px;
      }
      #status {
        margin-top: 8px;
        font-size: 11px;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <label for="slot">Agent slot</label>
    <select id="slot">
      <option value="0">Slot 1 (AG00)</option>
      <option value="1">Slot 2 (AG01)</option>
      <option value="2">Slot 3 (AG02)</option>
      <option value="3">Slot 4 (AG03)</option>
      <option value="4">Slot 5 (AG04)</option>
      <option value="5">Slot 6 (AG05)</option>
    </select>
    <p id="status">Connecting…</p>
    <p class="help">
      Matches Codex Micro agent keys 1–6. Live colors require the companion
      (<code>--chatgpt</code>). Changing this rebinds which agent this key follows.
    </p>
    <script>
      /**
       * Stream Deck PI protocol:
       * connectElgatoStreamDeckSocket(port, uuid, registerEvent, info, actionInfo)
       * setSettings requires: event, action, context, payload
       */
      (function () {
        let websocket = null;
        let uuid = "";
        let actionUUID = "";
        let context = "";
        const select = document.getElementById("slot");
        const statusEl = document.getElementById("status");

        function setStatus(msg) {
          if (statusEl) statusEl.textContent = msg;
        }

        function coerceSlot(raw) {
          const n = typeof raw === "string" ? Number(raw) : raw;
          if (typeof n === "number" && Number.isInteger(n) && n >= 0 && n <= 5)
            return n;
          return 0;
        }

        function applySettings(settings) {
          const slot = coerceSlot(settings && settings.slot);
          select.value = String(slot);
          setStatus("Bound to Slot " + (slot + 1));
        }

        function saveSlot() {
          if (!websocket || websocket.readyState !== WebSocket.OPEN) {
            setStatus("Not connected to Stream Deck");
            return;
          }
          const slot = coerceSlot(select.value);
          const msg = {
            event: "setSettings",
            action: actionUUID,
            context: context,
            payload: { slot: slot },
          };
          websocket.send(JSON.stringify(msg));
          setStatus("Saved Slot " + (slot + 1));
        }

        window.connectElgatoStreamDeckSocket = function (
          inPort,
          inUUID,
          inRegisterEvent,
          inInfo,
          inActionInfo,
        ) {
          uuid = inUUID;
          let actionInfo = {};
          try {
            actionInfo = JSON.parse(inActionInfo);
          } catch (e) {
            setStatus("Bad actionInfo");
            return;
          }
          actionUUID = actionInfo.action || "";
          context = actionInfo.context || "";
          applySettings((actionInfo.payload && actionInfo.payload.settings) || {});

          websocket = new WebSocket("ws://127.0.0.1:" + inPort);
          websocket.onopen = function () {
            websocket.send(
              JSON.stringify({ event: inRegisterEvent, uuid: inUUID }),
            );
            // Ask plugin for current settings (fresh)
            websocket.send(
              JSON.stringify({
                event: "getSettings",
                context: context,
              }),
            );
            setStatus("Connected — pick a slot");
          };
          websocket.onmessage = function (evt) {
            let data;
            try {
              data = JSON.parse(evt.data);
            } catch (e) {
              return;
            }
            if (
              data.event === "didReceiveSettings" &&
              data.payload &&
              data.payload.settings
            ) {
              applySettings(data.payload.settings);
            }
          };
          websocket.onerror = function () {
            setStatus("WebSocket error");
          };

          select.addEventListener("change", saveSlot);
        };
      })();
    </script>
  </body>
</html>
